{% extends 'inicio/base.html' %}
{% load widget_tweaks %}


{% block body %}
<form method="POST" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}
    {% for field in form %}
        <div>
            <label class="block mb-2 font-medium text-gray-700">
                {{ field.label }}
            </label>

            {{ field|add_class:"w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-black focus:border-black outline-none transition" }}
            
        </div>
    {% endfor %}
        <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition duration-200 cursor-pointer">
                Guardar Cambios
        </button>
        <a href="{% url 'posteos' %}" class="p-2 bg-blue-600 hover:bg-blue-700 cursor-pointer rounded text-white">Volver</a>
    </form>
{% endblock %}
